# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  aliases:
    global:
      q: close
      qa: quit
      qs: quit --save
      s: session-save
      wqa: quit --save
  auto_save.session:
    global: true
  backend:
    global: webengine
  bindings.commands:
    global:
      normal:
        C: hint all yank
        Y: hint links spawn mpv {hint-url}
  colors.completion.category.fg:
    global: white
  colors.tabs.bar.bg:
    global: '#303040'
  colors.tabs.even.bg:
    global: '#706E7E'
  colors.tabs.indicator.start:
    global: '#0000aa'
  colors.tabs.odd.bg:
    global: '#706E7E'
  colors.tabs.odd.fg:
    global: white
  colors.tabs.pinned.even.bg:
    global: darkseagreen
  colors.tabs.selected.even.bg:
    global: '#A4B9EF'
  colors.tabs.selected.even.fg:
    global: white
  colors.tabs.selected.odd.bg:
    global: '#A4B9EF'
  colors.tabs.selected.odd.fg:
    global: white
  colors.webpage.darkmode.enabled:
    global: false
  colors.webpage.darkmode.threshold.background:
    global: 205
  colors.webpage.darkmode.threshold.text:
    global: 150
  completion.scrollbar.width:
    global: 12
  content.autoplay:
    global: false
  content.blocking.adblock.lists:
    global:
    - https://easylist.to/easylist/easylist.txt
    - https://easylist.to/easylist/easyprivacy.txt
    - https://secure.fanboy.co.nz/fanboy-cookiemonster.txt
    - https://easylist.to/easylist/fanboy-social.txt
    - https://secure.fanboy.co.nz/fanboy-annoyance.txt
    - https://raw.githubusercontent.com/anudeepND/youtubeadsblacklist/master/domainlist.txt
  content.blocking.enabled:
    global: false
  content.blocking.hosts.lists:
    global:
    - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
    - https://raw.githubusercontent.com/mitchellkrogza/Badd-Boyz-Hosts/master/hosts
    - http://adblock.mahakala.is
    - http://sysctl.org/cameleon/hosts
    - https://raw.githubusercontent.com/azet12/KADhosts/master/KADhosts.txt
    - https://raw.githubusercontent.com/yous/YousList/master/hosts.txt
    - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling/hosts
    - http://www.malwaredomainlist.com/hostslist/hosts.txt
    - http://hostsfile.org/Downloads/hosts.txt
    - http://someonewhocares.org/hosts/zero/hosts
    - http://adaway.org/hosts.txt
    - http://winhelp2002.mvps.org/hosts.txt
    - http://pgl.yoyo.org/as/serverlist.php?hostformat=hosts&showintro=0&mimetype=plaintext
    - https://gist.githubusercontent.com/anilshanbhag/7576643/raw/1a2b22edbfb609366548982a3638ba155bd8c33e/hosts
    - https://github.com/Ewpratten/youtube_ad_blocklist/blob/master/blocklist.txt
  content.blocking.method:
    global: auto
  content.blocking.whitelist:
    global: null
  content.javascript.enabled:
    global: true
  content.notifications.enabled:
    https://www.reddit.com: false
  content.pdfjs:
    global: true
  downloads.location.directory:
    global: /home/obey/Downloads
  downloads.location.prompt:
    global: false
  downloads.position:
    global: top
  downloads.remove_finished:
    global: -1
  editor.command:
    global:
    - terminal
    - --title
    - qute_edit
    - -e
    - nvim
    - -f
    - '{file}'
  fileselect.folder.command:
    global:
    - terminal
    - --title
    - qute_lf
    - -e
    - lf
  fileselect.handler:
    global: external
  fileselect.multiple_files.command:
    global:
    - terminal
    - --title
    - qute_lf
    - -e
    - lf
  fileselect.single_file.command:
    global:
    - terminal
    - --title
    - qute_lf
    - -e
    - lf
  fonts.completion.category:
    global: bold default_size default_family
  fonts.completion.entry:
    global: default_size default_family
  fonts.contextmenu:
    global: null
  fonts.default_family:
    global: Hack
  fonts.default_size:
    global: 10pt
  hints.dictionary:
    global: /usr/share/dict/words
  hints.uppercase:
    global: true
  keyhint.radius:
    global: 6
  tabs.favicons.scale:
    global: 1.0
  tabs.last_close:
    global: ignore
  tabs.max_width:
    global: 200
  tabs.min_width:
    global: 100
  tabs.padding:
    global:
      bottom: 4
      left: 5
      right: 5
      top: 4
  tabs.position:
    global: top
  tabs.title.alignment:
    global: left
  tabs.title.format:
    global: '{private}{audio}{index}: {current_title}'
  tabs.width:
    global: 10%
  tabs.wrap:
    global: true
  url.default_page:
    global: file://localhost/home/obey/Documents/git/StartPage/index.html
  url.searchengines:
    global:
      DEFAULT: https://search.brave.com/search?q={}&source=web
  url.start_pages:
    global: file://localhost/home/obey/Documents/git/StartPage/index.html
